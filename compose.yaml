services:
  mysql:
    image: mysql:8.0
    container_name: kakeibo-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dummy_root_password
      MYSQL_DATABASE: kakeibo
      MYSQL_USER: dummy_app_user
      MYSQL_PASSWORD: dummy_app_password
      TZ: Asia/Tokyo
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pdummy_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: kakeibo-backend
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./backend/.env.docker
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    command: >
      sh -lc "
      cp .env.docker .env &&
      composer install &&
      php artisan migrate --force &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  frontend:
    build:
      context: ./frontend
    container_name: kakeibo-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: >
      sh -lc "
      npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173
      "

  adminer:
    image: adminer:4
    container_name: kakeibo-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  mysql-data:
  backend-vendor:
  frontend-node-modules:
